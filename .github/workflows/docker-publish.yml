name: Build and publish Docker image

on:
  push:
    branches:
      - development
      - master
  pull_request:
    branches:
      - development
      - master
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore FeedCord.sln

      - name: Verify formatting
        run: dotnet format FeedCord.sln --no-restore --verify-no-changes

      - name: Build
        run: dotnet build FeedCord.sln --configuration Release --no-restore -warnaserror

      - name: Test
        run: dotnet test FeedCord.sln --configuration Release --no-restore --no-build

  docker:
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate tags
        id: meta
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/development" ]]; then
            echo "tags=taeleus/feedcord:beta,taeleus/feedcord:${{ github.sha }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/master" ]]; then
            echo "tags=taeleus/feedcord:latest,taeleus/feedcord:${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: FeedCord
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
